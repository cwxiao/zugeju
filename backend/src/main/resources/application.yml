server:
  port: 8080

spring:
  application:
    name: play-minipro-backend
  config:
    import: optional:file:./local-secrets.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/play_minipro}
    username: ${DB_USERNAME:play}
    password: ${DB_PASSWORD:play1234}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:play-minipro-dev-secret-play-minipro-dev-secret-2026}
    expire-seconds: ${JWT_EXPIRE_SECONDS:10800}
  wechat:
    app-id: ${WECHAT_MINI_APP_ID:wxb8fd5841e5f0a83d}
    app-secret: ${WECHAT_MINI_APP_SECRET:}
    mock-login-enabled: ${WECHAT_MOCK_LOGIN_ENABLED:true}

logging:
  level:
    com.playminipro: info